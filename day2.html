<!DOCTYPE html>
<!-- Defines the document as HTML5 -->

<html lang="en">
<!-- Root element of the webpage -->

<head>
    <!-- Contains page information (not visible on the page) -->

    <meta charset="UTF-8">
    <!-- Allows browser to display many characters properly -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Makes the page responsive on mobile devices -->

    <title>Document</title>
    <!-- Title shown in browser tab -->
</head>

<body>
    <!-- Visible content starts here -->

    <h1>My name is Samyo Limbu</h1>
    <!-- Main heading -->

    <p>I am 19 years <b>old</b></p>
    <!-- Paragraph. <b> makes text bold -->

    <a href="https://www.youtube.com/watch?v=AGrh9X0eU8I">
        touch this
    </a>
    <!-- Clickable link to a YouTube video -->

    <br><br>
    <!-- Line breaks for spacing -->

    <img src="https://koa.com/blog/images/camping-by-a-stream.jpg?preset=heroimagecropped" alt="Camping image">
    <!-- Displays an image from the internet -->

    <p style="background-color:pink;">
        This paragraph has a pink background.
    </p>
    <!-- Paragraph with inline CSS styling -->

</body>
</html>
